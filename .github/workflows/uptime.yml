# Uptime Aproba — sonde /api/health toutes les 30 min ; en cas d'échec le job
# échoue et GitHub t'envoie un email automatiquement.
# À créer via GitHub : Add file → Create new file → .github/workflows/uptime.yml
name: Uptime
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Landing répond
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://aproba-software.com)
          echo "landing → $code"
          [ "$code" = "200" ]
      - name: App + base de données répondent
        run: |
          body=$(curl -s --max-time 20 https://aproba-software.com/api/health)
          echo "health → $body"
          echo "$body" | grep -q '"ok":true'
