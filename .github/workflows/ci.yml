# CI Aproba — tests + typecheck + build sur chaque push/PR vers main.
# À créer via GitHub : Add file → Create new file → .github/workflows/ci.yml
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    env:
      # Placeholders : le build n'appelle aucun service (replis défensifs partout),
      # il a juste besoin que les clients se construisent.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx vitest run
      - run: npx tsc --noEmit
      - run: npx next build --no-lint
